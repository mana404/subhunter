name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build subhunter
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: subhunter-linux-amd64
          - goos: linux
            goarch: arm64
            name: subhunter-linux-arm64
          - goos: windows
            goarch: amd64
            name: subhunter-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            name: subhunter-darwin-amd64
          - goos: darwin
            goarch: arm64
            name: subhunter-darwin-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o ${{ matrix.name }} ./cmd/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/*
          generate_release_notes: true
          body: |
            ## subhunter ${{ github.ref_name }}

            ### Install
            ```bash
            # Linux (amd64)
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/subhunter-linux-amd64
            chmod +x subhunter-linux-amd64
            sudo mv subhunter-linux-amd64 /usr/local/bin/subhunter

            # macOS (arm64 / M1/M2)
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/subhunter-darwin-arm64
            chmod +x subhunter-darwin-arm64
            sudo mv subhunter-darwin-arm64 /usr/local/bin/subhunter

            # Go install
            go install github.com/${{ github.repository }}/cmd@latest
            ```

            ### Usage
            ```bash
            subhunter -d hackerone.com -o results.txt
            subhunter -d nasa.gov -v -r -o live.txt
            subhunter -d target.com --github-token $GITHUB_TOKEN -o subs.txt
            ```